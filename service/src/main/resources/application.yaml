spring:
  profiles:
    active: @profileActive@

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss

lab:
  cache:
    # 是否启用缓存
    enabled: true
    # 默认过期时间
    default-expiration: 30m
    # 缓存空值（防止缓存穿透）
    cache-null-values: true
    # 空值缓存过期时间（秒）
    null-value-ttl: 60
    # 序列化方式：jackson/jdk
    serializer: jackson

server:
  port: 8088

task:
  send:
    mqtt-task-host: http://localhost:8089/task/add
    socket-task-host:
  polling:
    core-pool-size: 8
    initial-delay: 0
    period: 5
    polling-time-unit: SECONDS

mybatis-plus:
  configuration:
    #    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

server:
  port: 18080

spring:
  application:
    name: schedule-demo

  datasource:
    url: jdbc:mysql://localhost:3306/schedule_demo?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  quartz:
    job-store-type: memory
    scheduler-name: demoScheduler
    properties:
      org.quartz.threadPool.threadCount: 5

